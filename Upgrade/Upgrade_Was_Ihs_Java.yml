- name: Copy and Execute WAS, IHS, and Java Upgrade Script Inside Container
  hosts: "{{ target_host }}"
  become: yes

  vars:
    container_name: "emmis-t0-w1234"
    local_script_path: "/home/anandyala/upgrade_was_ihs_java.sh"
    container_script_path: "/work/upgrade_was_ihs_java.sh"

    # Passed via survey or template
    was_user: ""
    was_password: ""

    was_feature_id: ""
    was_repo_path: ""
    was_install_dir: ""

    ihs_feature_id: ""
    ihs_repo_path: ""
    ihs_install_dir: ""

    java_feature_id: ""
    java_repo_path: ""
    java_install_dir: ""

  tasks:

    - name: Ensure the local script exists before copy
      stat:
        path: "{{ local_script_path }}"
      register: local_script
      failed_when: not local_script.stat.exists

    - name: Copy upgrade script into container
      shell: docker cp "{{ local_script_path }}" {{ container_name }}:{{ container_script_path }}
      when: not ansible_check_mode

    - name: Make script executable inside container
      shell: docker exec {{ container_name }} chmod +x {{ container_script_path }}
      when: not ansible_check_mode

    - name: Execute the upgrade script inside container
      shell: |
        docker exec {{ container_name }} bash {{ container_script_path }} \
        "{{ was_user }}" \
        "{{ was_password }}" \
        "{{ was_feature_id }}" \
        "{{ was_repo_path }}" \
        "{{ was_install_dir }}" \
        "{{ ihs_feature_id }}" \
        "{{ ihs_repo_path }}" \
        "{{ ihs_install_dir }}" \
        "{{ java_feature_id }}" \
        "{{ java_repo_path }}" \
        "{{ java_install_dir }}"
      when: not ansible_check_mode
